services:
  - type: web
    name: faithful-foundations
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: faithful-foundations-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: faithful-foundations-db
    databaseName: faithfulfoundations
    user: ffadmin
